<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍑 岡山瀨戶內慢旅</title>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#c98562">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

<header class="hero">
    <h1>🍑 岡山瀨戶內慢旅</h1>
    <p>2026/07/22 ～ 2026/07/27</p>
    <p>6天5夜｜4位成人｜素食旅行</p>
</header>


<main>

<section id="home" class="card">
    <h2>🏠 旅程資訊</h2>

    <div class="info">
        <p>✈️ 去程：虎航 IT262</p>
        <p>高雄 → 岡山</p>
        <p>12:40 起飛｜16:30 抵達</p>
    </div>

    <div class="info">
        <p>✈️ 回程：虎航 IT263</p>
        <p>岡山 → 高雄</p>
        <p>17:55 起飛｜20:15 抵達</p>
    </div>

</section>


<section id="schedule" class="card">

<section id="schedule" class="card">

<h2>📅 每日行程</h2>


<div id="schedule-area">

行程載入中...

</div>


</section>



<section id="map" class="card">

<h2>🗺️ 互動地圖</h2>

<div id="map-area">

地圖將在下一階段加入

</div>

</section>



<section id="transport" class="card">

<h2>🚆 交通資訊</h2>

<div id="transport-area">

交通資料載入中...

</div>

</section>



<section id="hotel" class="card">

<h2>🏠 住宿</h2>

<p>
備前三門車站附近 Airbnb
</p>

<a href="https://maps.app.goo.gl/716HUX5tULXrjg2JA?g_st=il"
target="_blank">

📍 開啟住宿導航

</a>

</section>



<section id="budget" class="card">

<h2>💰 預算</h2>


<input 
id="budget-item"
placeholder="例如：尾道午餐">


<br><br>


<input
id="budget-money"
type="number"
placeholder="例如：1500">


<br><br>


<select id="budget-type">

<option>
餐飲
</option>

<option>
交通
</option>

<option>
購物
</option>

<option>
住宿
</option>

</select>


<br><br>


<button onclick="addExpense()">

新增花費

</button>


<h3 id="budget-total">

</h3>


<div id="budget-list">

</div>


</section>



<section id="bag" class="card">

<h2>🎒 行李清單</h2>

<div id="check-progress">

</div>

<hr>


<div id="checklist-area">

</div>


</section>


</main>



<nav class="bottom-nav">

<a href="#home">🏠</a>

<a href="#schedule">📅</a>

<a href="#map">🗺️</a>

<a href="#budget">💰</a>

<a href="#bag">🎒</a>

</nav>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="itinerary.js"></script>

<script src="schedule.js"></script>

<script src="maps.js"></script>

<script src="transport.js"></script>

<script src="budget.js"></script>

<script src="checklist.js"></script>

<script src="app.js"></script>
<script>

if(
'serviceWorker' in navigator
){

navigator.serviceWorker.register(
'service-worker.js'
);

}

</script>
</body>

</html>
